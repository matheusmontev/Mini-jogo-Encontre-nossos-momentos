<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Memory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Secao Home -->
    <section id="home-section" class="screen active">
      <div class="content-wrapper">
        <h1>Velvet Memory</h1>
        <p>Um jogo da memória especial para relembrarmos nossos melhores momentos.</p>
        <button id="start-btn" class="btn primary-btn">Iniciar Jogo</button>
        <button id="home-gallery-btn" class="btn secondary-btn" style="display:none;">Ver Galeria</button>
      </div>
    </section>

    <!-- Secao do Jogo -->
    <section id="game-section" class="screen">
      <header class="game-header">
        <div class="stats">
          <span>Tentativas: <span id="attempts">0</span></span>
        </div>
        <button id="quit-btn" class="btn small-btn">Sair</button>
      </header>
      <div class="grid-container" id="memory-grid">
        <!-- Cards gerados pelo JavaScript -->
      </div>
      <!-- Notificacao quando o par eh encontrado -->
      <div id="message-toast" class="toast"></div>
    </section>

    <!-- Secao de Vitoria -->
    <section id="victory-section" class="screen">
      <div class="content-wrapper">
        <h1>Parabéns!</h1>
        <p>Você encontrou todos os nossos momentos!</p>
        <div class="stats-final">
          <p>Total de tentativas: <span id="final-attempts">0</span></p>
        </div>
        <button id="gallery-btn" class="btn primary-btn">Ver Galeria</button>
        <button id="restart-btn" class="btn secondary-btn">Jogar Novamente</button>
      </div>
    </section>

    <!-- Secao da Galeria -->
    <section id="gallery-section" class="screen">
      <header class="gallery-header">
        <h2>Nossas Memórias</h2>
        <button id="back-home-btn" class="btn small-btn">Voltar</button>
      </header>
      <div class="gallery-grid" id="gallery-grid">
        <!-- Itens da galeria gerados pelo JavaScript -->
      </div>
    </section>
  </div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
