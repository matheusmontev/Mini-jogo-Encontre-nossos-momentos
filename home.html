<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/home.css">
  <script src="js/utils.js"></script>
  <script src="js/home.js" defer></script>
</head>
<body class="bg-background text-on-background antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center bg-background group/design-root overflow-x-hidden p-container-padding">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden opacity-40">
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-primary-container/20 blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full bg-secondary-container/10 blur-3xl"></div>
</div>
<!-- Main Content Vessel -->
<div class="relative z-10 w-full max-w-[480px] flex flex-col items-center">
<!-- Hero Illustration/Icon -->
<div class="mb-lg p-6 bg-surface-container-lowest rounded-xl soft-glow">
<div class="w-24 h-24 flex items-center justify-center bg-primary-container/30 rounded-full text-secondary">
<span class="material-symbols-outlined !text-[48px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Headline Text Shared Component Logic -->
<div class="w-full text-center mb-md">
<h1 class="text-on-surface tracking-tight text-[32px] font-bold leading-tight px-4 pb-3">
                    Encontre nossos momentos ❤️
                </h1>
<p class="text-on-surface-variant text-body-lg font-normal leading-normal pb-3 pt-1 px-4">
                    Um pequeno jogo para celebrar nossas memórias.
                </p>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-sm w-full px-4 items-center">
<button class="w-full max-w-[320px] flex cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-8 bg-primary text-on-primary text-lg font-bold leading-normal tracking-[0.015em] transition-all hover:scale-[1.02] hover:shadow-lg active:scale-[0.98]">
<span class="truncate">Iniciar jogo</span>
</button>
</div>
<!-- Stats Preview -->
</div>
<!-- Floating Decorative Memories -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute top-[15%] left-[10%] -rotate-6 w-16 h-20 bg-white p-1 rounded-sm shadow-md border border-surface-container-highest hidden sm:block">
<div class="w-full h-14 bg-surface-container-highest flex items-center justify-center text-primary/30">
<span class="material-symbols-outlined">image</span>
</div>
</div>
<div class="absolute bottom-[20%] right-[12%] rotate-12 w-20 h-24 bg-white p-1 rounded-sm shadow-md border border-surface-container-highest hidden sm:block">
<div class="w-full h-18 bg-surface-container-highest flex items-center justify-center text-secondary/20">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
</div>
</div>
<!-- Footer Note -->
<div class="mt-xl text-center px-container-padding">
<p class="text-label-sm text-outline font-normal">
                Feito com carinho para preservar o que importa.
            </p>
</div>
</div>
</body></html>
