<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Jogo da Memória</title>
  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- CSS -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/jogo.css">
  <!-- Data e JS -->
  <script src="../data/memorias.js"></script>
  <script src="../js/jogo.js" defer></script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">

  <!-- Top Navigation Shell -->
  <header class="game-header">
    <nav class="game-header-inner">
      <div class="flex items-center gap-sm">
        <h1 class="game-title">A Love Letter to Memory</h1>
      </div>
    </nav>
  </header>

  <!-- Main Game Canvas -->
  <main class="game-canvas">
    <!-- Game Header / Stats -->
    <div class="game-stats">
      <div class="game-stats-box">
        <p class="game-stats-text">Tentativas: <span id="contador-tentativas" class="text-secondary">0</span></p>
      </div>
      <div class="game-stats-box">
        <p class="game-stats-text">Tempo: <span id="contador-tempo" class="text-secondary">00:00</span></p>
      </div>
    </div>

    <!-- Dynamic Message Area -->
    <div class="game-message">
      <p class="game-message-text">Encontre os pares para revelar as memórias...</p>
    </div>

    <!-- Memory Grid (4x3) -->
    <div class="game-grid" id="game-grid">
    </div>

    <!-- Action Button -->
    <div class="w-full mt-auto">
      <a href="jogo.html" class="game-restart-btn">
        <span class="material-symbols-outlined" data-icon="restart_alt">restart_alt</span> Reiniciar jogo
      </a>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <a href="../index.html" class="nav-item">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
    </a>
    <a href="jogo.html" class="nav-item nav-item-active">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">extension</span>
    </a>
    <a href="galeria.html" class="nav-item">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
    </a>
  </nav>

</body>
</html>
