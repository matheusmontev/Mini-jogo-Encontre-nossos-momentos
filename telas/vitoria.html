<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Vitória!</title>
  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- CSS -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/vitoria.css">
  <!-- Data e JS -->
  <script src="../data/memorias.js"></script>
  <script src="../js/vitoria.js" defer></script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">

  <!-- TopAppBar -->
  <header class="vitoria-header">
    <div class="vitoria-header-inner">
      <div class="vitoria-header-left">
        <span class="material-symbols-outlined text-primary" data-icon="flutter_dash">flutter_dash</span>
        <h1 class="vitoria-title">A Love Letter to Memory</h1>
      </div>
    </div>
  </header>

  <!-- Main Content Canvas -->
  <main class="vitoria-canvas">
    <!-- Background Decorative Elements -->
    <div class="vitoria-bg-deco">
      <div class="vitoria-deco-icon vitoria-deco-icon-top">
        <span class="material-symbols-outlined" data-icon="favorite" style="font-size: 3.75rem; font-variation-settings: 'FILL' 1;">favorite</span>
      </div>
      <div class="vitoria-deco-icon vitoria-deco-icon-bottom">
        <span class="material-symbols-outlined" data-icon="auto_awesome" style="font-size: 4.375rem; font-variation-settings: 'FILL' 1;">auto_awesome</span>
      </div>
    </div>

    <!-- Success Vessel -->
    <div class="vitoria-vessel">
      <!-- Celebration Hero Image -->
      <div class="vitoria-hero">
        <div class="vitoria-hero-blur"></div>
        <img class="vitoria-hero-img" data-alt="Soft ethereal illustration of two hands reaching towards each other surrounded by floating translucent hearts and warm golden particles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSpG7Zeh0LcyL7TmV6PJXqoIy7bSL-qWAm6zEMkcSrtvCw-b-20OJgPA0s-UlBSn6UMflmdbtLeyyuokYtVcx0sL4j3bIjYaqGeRvb6hvIHzxveRI_0KqfvlT0gqeSSt2fZxMQ6Lnyg8Ap-lqQ_rB9YrBUiJ23wOsWefGOV3oCWj2nl8Z6y3Mouw0UopmFvJAR_cxebTSQYCwh95lzh6KRWeErGHPCxRZ7UQ0z5N3EHZ0uuRquoqdpE7HAON6DLIb5OkFm6VV7xNI"/>
        <div class="vitoria-heart-badge heart-float">
          <span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
        </div>
      </div>

      <!-- Message Group -->
      <div class="vitoria-messages">
        <span class="vitoria-label block">Parabéns</span>
        <h2 class="vitoria-headline">Você encontrou todos os nossos momentos ❤️</h2>
        <p class="vitoria-body">Cada par revelado é uma lembrança guardada com carinho no coração.</p>
      </div>

      <!-- Stats Summary -->
      <div class="vitoria-stats">
        <div class="vitoria-stat">
          <span class="vitoria-stat-label">TEMPO</span>
          <span class="vitoria-stat-value">02:45</span>
        </div>
        <div class="vitoria-stat">
          <span class="vitoria-stat-label">MOVIMENTOS</span>
          <span class="vitoria-stat-value">18</span>
        </div>
      </div>

      <!-- Primary Actions -->
      <div class="vitoria-actions">
        <a href="jogo.html" class="vitoria-btn-primary">
          <span class="material-symbols-outlined" data-icon="replay">replay</span> Jogar novamente
        </a>
        <a href="galeria.html" class="vitoria-btn-secondary">
          <span class="material-symbols-outlined" data-icon="photo_library">photo_library</span> Ver Galeria
        </a>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <a href="../index.html" class="nav-item">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
    </a>
    <a href="jogo.html" class="nav-item nav-item-active">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">extension</span>
    </a>
    <a href="galeria.html" class="nav-item">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
    </a>
  </nav>

</body>
</html>
